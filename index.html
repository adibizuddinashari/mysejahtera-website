<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MyGrocer™ · Kedai Runcit Layan Diri Pertama di Malaysia · …senang aje!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BioRhyme:wght@400;700;800&family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.20/dist/lenis.min.js"></script>
<style>
  :root{
    --yellow:#FFDE17;--yellow-soft:#FFF8D0;--yellow-tint:#FFFCE8;
    --purple:#863694;--purple-deep:#5E2668;--purple-soft:#F3EAF4;
    --ink:#1B1430;--muted:#6A6480;--line:#E8E4F0;--bg:#FFFDF7;--white:#FFFFFF;--green:#1D7979;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
  h1,h2,h3,h4,h5,h6,.logo,.foot-logo{font-family:'BioRhyme',Georgia,serif}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  .container{max-width:1240px;margin:0 auto;padding:0 24px}
  .mono{font-family:'Noto Sans',sans-serif}
  #home{scroll-margin-top:80px}
  nav.top{position:sticky;top:0;z-index:50;background:rgba(255,253,247,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;gap:32px;height:72px}
  .logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.01em}
  .logo img{height:36px;width:auto;display:block}
  .logo-foot img{height:42px;width:auto;display:block;filter:brightness(0) invert(1)}
  .nav-links{display:flex;gap:28px;margin-left:24px}
  .nav-links a{font-weight:600;font-size:14.5px;color:var(--ink);position:relative;padding:6px 0}
  .nav-links a.active{color:var(--purple)}
  .nav-links a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:3px;background:var(--yellow);border-radius:2px}
  .nav-cta{margin-left:auto;display:flex;gap:14px;align-items:center}
  .lang-toggle{display:inline-flex;background:var(--purple-soft);padding:3px;border-radius:999px;border:1.5px solid var(--line)}
  .lang-toggle button{font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:999px;color:var(--muted);letter-spacing:.04em;transition:all .15s}
  .lang-toggle button.on{background:var(--purple);color:#fff}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:10px;font-weight:700;font-size:14px;transition:transform .15s,box-shadow .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--purple);color:#fff}
  .btn-primary:hover{background:var(--purple-deep);box-shadow:0 8px 24px -8px rgba(134,54,148,.5)}
  .btn-yellow{background:var(--yellow);color:var(--ink)}
  .btn-yellow:hover{box-shadow:0 8px 24px -8px rgba(255,222,23,.6)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:#fff}

  .hero{background:var(--yellow);position:relative;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;padding:64px 0 80px;align-items:center}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:10px;background:var(--purple);color:#fff;padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .hero-eyebrow .dot{width:8px;height:8px;background:var(--yellow);border-radius:50%;animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
  @keyframes hero-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .hero-slide>*{animation:hero-in .65s cubic-bezier(.22,1,.36,1) both}
  .hero-slide>*:nth-child(1){animation-delay:0ms}
  .hero-slide>*:nth-child(2){animation-delay:75ms}
  .hero-slide>*:nth-child(3){animation-delay:115ms}
  .hero-slide>*:nth-child(4){animation-delay:155ms}
  .hero-slide>*:nth-child(5){animation-delay:195ms}
  .hero-slide>*:nth-child(6){animation-delay:235ms}
  h1.hero-title{font-size:clamp(40px,5.5vw,72px);line-height:1.02;letter-spacing:-.025em;font-weight:800;margin:18px 0 8px;color:var(--ink)}
  h1.hero-title .slash{color:var(--purple);font-weight:800}
  .hero-sub{font-size:18px;line-height:1.55;color:var(--ink);opacity:.85;max-width:520px;margin:18px 0 28px}
  .hero-sub b{color:var(--purple)}
  .hero-cta{display:flex;gap:12px;flex-wrap:wrap}
  .hero-marquee{margin-top:34px;display:flex;gap:24px;font-family:'Noto Sans',sans-serif;font-size:12px;color:var(--purple);font-weight:600}
  .hero-marquee span{display:inline-flex;align-items:center;gap:8px}
  .hero-marquee .dotm{width:6px;height:6px;background:var(--purple);border-radius:50%}

  .store-stage{position:relative;aspect-ratio:1/1;background:var(--purple);border-radius:32px;padding:28px;color:#fff;box-shadow:0 30px 60px -20px rgba(0,0,0,.25);overflow:hidden}
  .store-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;transition:transform .65s cubic-bezier(.25,.46,.45,.94)}
  .store-stage:hover .store-img{transform:scale(1.06)}
  .store-stage::after{content:"";position:absolute;bottom:0;left:0;right:0;height:45%;background:linear-gradient(to top,rgba(0,0,0,.48) 0%,transparent 100%);z-index:1;pointer-events:none}
  .store-location{position:absolute;bottom:22px;left:22px;z-index:2;color:#fff;font-size:12.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;line-height:1}
  .door{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:62%;aspect-ratio:.78;background:#fff;border-radius:24px 24px 4px 4px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4);overflow:hidden;border:6px solid var(--ink)}
  .door .face-ring{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;border:3px dashed var(--purple);display:grid;place-items:center;animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{transform:translateX(-50%) rotate(0)}50%{transform:translateX(-50%) rotate(180deg)}}
  .door .face{width:44px;height:44px;border-radius:50%;background:var(--yellow);position:relative}
  .door .face::before,.door .face::after{content:"";position:absolute;width:5px;height:5px;background:var(--ink);border-radius:50%;top:16px}
  .door .face::before{left:12px}.door .face::after{right:12px}
  .door .face-smile{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);width:18px;height:8px;border-bottom:2px solid var(--ink);border-radius:0 0 12px 12px}
  .door .shelf{position:absolute;left:8px;right:8px;bottom:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
  .door .shelf div{height:34px;background:linear-gradient(180deg,var(--yellow-soft),#fff);border-radius:4px;border:1px solid var(--line)}
  .door .shelf div:nth-child(2){background:linear-gradient(180deg,#EDD5F0,#fff)}
  .door .shelf div:nth-child(4){background:linear-gradient(180deg,#EDD5F0,#fff)}
  .door-floor{position:absolute;left:8px;right:8px;bottom:0;height:8px;background:repeating-linear-gradient(90deg,var(--ink) 0 6px,transparent 6px 14px)}

  section{padding:80px 0;position:relative;scroll-margin-top:80px}
  section.tinted{background:var(--yellow-tint)}
  .eyebrow{font-family:'Noto Sans',sans-serif;font-size:12px;font-weight:600;color:var(--purple);letter-spacing:.16em;text-transform:uppercase;display:inline-flex;align-items:center;gap:10px}
  .eyebrow::before{content:"";width:24px;height:2px;background:var(--yellow)}
  h2{font-size:clamp(32px,3.6vw,48px);line-height:1.08;letter-spacing:-.02em;font-weight:800;margin:14px 0 10px}
  .sec-lede{font-size:18px;color:var(--muted);max-width:640px;line-height:1.55}

  .what-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:64px;align-items:center}
  .what-slider{position:relative;aspect-ratio:1/1.05;border-radius:24px;overflow:hidden;border:1.5px solid var(--line);box-shadow:0 20px 48px -16px rgba(61,43,158,.18)}
  .what-slide-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .9s cubic-bezier(.22,1,.36,1)}
  .what-slide-img.active{opacity:1}
  .what-slider-dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
  .what-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.55);border:none;cursor:pointer;padding:0;transition:all .25s}
  .what-dot.on{background:#fff;width:22px;border-radius:4px}
  .what-stat{display:flex;gap:18px;margin-top:32px;flex-wrap:wrap}
  .stat-card{flex:1;min-width:140px;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px}
  .stat-num{font-size:32px;font-weight:800;color:var(--purple);letter-spacing:-.02em}
  .stat-lbl{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px}
  .wc-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700}
  .wc-amt{font-family:'Noto Sans',sans-serif;color:var(--purple)}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px;counter-reset:s}
  .step{background:#fff;border:1.5px solid var(--line);border-radius:24px;padding:32px;position:relative;transition:transform .25s, box-shadow .25s, border-color .25s}
  .step:hover{transform:translateY(-4px);box-shadow:0 24px 40px -20px rgba(134,54,148,.18);border-color:var(--purple)}
  .step-num{counter-increment:s;font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:700;color:var(--purple);letter-spacing:.1em}
  .step-num::before{content:"STEP 0" counter(s)}
  .step-icon{margin:20px 0 24px;width:88px;height:88px;border-radius:20px;background:var(--yellow-soft);display:grid;place-items:center;color:var(--purple)}
  .step h3{font-size:24px;margin:0;font-weight:800;letter-spacing:-.01em}
  .step .alt-h{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px}
  .step p{margin:14px 0 0;color:var(--muted);font-size:14.5px;line-height:1.55}
  .step .arrow{position:absolute;right:-22px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:var(--purple);color:var(--yellow);display:grid;place-items:center;z-index:2;border:4px solid var(--yellow-tint)}
  .step:last-child .arrow{display:none}
  .how-purple{background:var(--purple)}
  .how-purple .eyebrow{color:var(--purple)}
  .how-purple .eyebrow::before{background:#fff}
  .how-purple h2,.how-purple .sec-lede{color:#fff}
  .how-purple .step{background:var(--yellow);border-color:var(--yellow)}
  .how-purple .step-num,.how-purple .step h3,.how-purple .step .alt-h,.how-purple .step p{color:var(--purple)}

  .why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:48px}
  .why-card{background:#fff;border-radius:20px;padding:28px 24px;border:1.5px solid var(--line);transition:all .2s;position:relative;overflow:hidden}
  .why-card::before{content:"";position:absolute;left:0;top:0;width:100%;height:6px;background:var(--yellow)}
  .why-card:nth-child(2)::before{background:var(--purple)}
  .why-card:nth-child(3)::before{background:var(--yellow)}
  .why-card:nth-child(4)::before{background:var(--purple)}
  .why-card:hover{transform:translateY(-4px);box-shadow:0 24px 40px -20px rgba(0,0,0,.12)}
  .why-icon{width:52px;height:52px;border-radius:14px;background:var(--purple-soft);color:var(--purple);display:grid;place-items:center;margin-bottom:18px}
  .why-card h4{font-size:18px;font-weight:800;margin:0;letter-spacing:-.01em}
  .why-card .alt-h{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}
  .why-card p{margin:12px 0 0;color:var(--muted);font-size:14px;line-height:1.55}

  .prod-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:24px}
  .deal-carousel-wrap{display:flex;align-items:center;gap:12px;margin-top:40px}
  .deal-track{display:flex;gap:12px;overflow-x:scroll;flex:1;scrollbar-width:none;scroll-behavior:auto}
  .deal-track::-webkit-scrollbar{display:none}
  .deal-card{flex:0 0 calc(25% - 9px);min-width:0;border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.09);display:flex;flex-direction:column}
  .deal-card-top{background:linear-gradient(160deg,#C2439A 0%,#7B1FA2 100%);padding:24px 14px 20px;position:relative;overflow:hidden;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .deal-ribbon{position:absolute;top:15px;left:-5%;width:110%;height:9px;background:repeating-linear-gradient(90deg,#FFE000 0 14px,#FF3A3A 14px 28px,#00B050 28px 42px,#0070C0 42px 56px);transform:rotate(-1.5deg);opacity:.9}
  .deal-promo-label{font-family:'BioRhyme',Georgia,serif;font-size:15px;font-weight:800;color:#FFE000;line-height:1.2;text-shadow:0 1px 4px rgba(0,0,0,.5);letter-spacing:-.01em;text-transform:uppercase;margin-top:14px}
  .deal-card-body{display:flex;align-items:center;padding:14px 12px 10px;flex:1;gap:8px}
  .deal-img-wrap{flex:0 0 44%;height:96px;display:flex;align-items:center;justify-content:center}
  .deal-img{max-width:100%;max-height:96px;object-fit:contain}
  .deal-price-wrap{flex:1;min-width:0}
  .deal-np{font-size:10px;color:#999;font-family:'Noto Sans',sans-serif;font-weight:600}
  .deal-np s{text-decoration-color:#999}
  .deal-price-row{display:flex;align-items:baseline;line-height:1;margin-top:3px}
  .deal-price-rm{font-size:13px;font-weight:800;color:var(--purple-deep);font-family:'BioRhyme',Georgia,serif}
  .deal-price-num{font-size:28px;font-weight:800;color:var(--purple-deep);letter-spacing:-.03em;font-family:'BioRhyme',Georgia,serif}
  .deal-price-each{font-size:8.5px;color:var(--muted);font-weight:700;font-family:'Noto Sans',sans-serif;letter-spacing:.05em;margin-top:2px}
  .deal-name{font-size:10px;font-weight:700;color:var(--ink);margin-top:9px;line-height:1.5;font-family:'Noto Sans',sans-serif;text-transform:uppercase;letter-spacing:.02em}
  .deal-disclaimer{background:#f5f5f5;font-size:8px;color:#bbb;padding:7px 12px;line-height:1.55;font-family:'Noto Sans',sans-serif}
  .deal-nav{width:44px;height:44px;border-radius:50%;background:#fff;border:1.5px solid var(--line);font-size:30px;color:var(--purple);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;padding-bottom:2px}
  .deal-nav:hover:not(:disabled){background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 4px 14px rgba(134,54,148,.3)}
  .deal-nav:disabled{opacity:.25;cursor:default}
  .more-note{text-align:center;margin-top:32px;font-family:'Noto Sans',sans-serif;font-size:13px;color:var(--muted)}
  .more-note b{color:var(--purple)}

  .loc-dropdown{position:relative;margin-top:32px}
  .loc-select{width:100%;appearance:none;-webkit-appearance:none;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px 44px 14px 18px;font-size:15px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer;transition:border-color .2s,box-shadow .2s;outline:none}
  .loc-select:focus,.loc-select:hover{border-color:var(--purple);box-shadow:0 0 0 3px rgba(61,43,158,.10)}
  .loc-select-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--purple);font-size:18px;line-height:1}
  .leaflet-container{border-radius:24px!important}
  .leaflet-popup-content-wrapper{border-radius:12px!important;font-family:'Noto Sans',sans-serif;font-size:13px;font-weight:700}
  .leaflet-popup-content{margin:10px 14px!important}
  .loc-grid{display:grid;grid-template-columns:1.3fr .9fr;gap:32px;margin-top:20px}
  .map{aspect-ratio:1.4/1;border:1.5px solid var(--line);border-radius:24px;overflow:hidden}
  .loc-card{background:#fff;border:1.5px solid var(--line);border-radius:24px;padding:28px;display:flex;flex-direction:column}
  .loc-num{font-family:'Noto Sans',sans-serif;font-size:12px;color:var(--purple);font-weight:700;letter-spacing:.1em}
  .loc-title{font-size:24px;font-weight:800;margin:8px 0 4px;letter-spacing:-.01em}
  .loc-addr{color:var(--muted);font-size:14.5px;line-height:1.6}
  .loc-hours{margin-top:20px;padding:14px;background:var(--yellow-soft);border-radius:12px;font-size:13.5px;display:flex;justify-content:space-between;align-items:center}
  .loc-hours b{font-weight:800}
  .loc-soon{margin-top:20px;padding:14px;background:var(--yellow-soft);border-radius:12px;font-size:13.5px;color:var(--muted);line-height:1.5}
  .loc-tags{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
  .loc-tag{font-size:11px;padding:5px 10px;border-radius:999px;background:var(--purple-soft);color:var(--purple);font-weight:700;font-family:'Noto Sans',sans-serif}
  .loc-actions{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .notify-card{background:var(--yellow);border-radius:32px;padding:64px;position:relative;overflow:hidden}
  .notify-card::before{content:"";position:absolute;right:-80px;top:-80px;width:300px;height:300px;border-radius:50%;background:var(--purple);opacity:.12}
  .notify-card::after{content:"";position:absolute;left:-40px;bottom:-60px;width:200px;height:200px;border-radius:50%;background:var(--ink);opacity:.06}
  .notify-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:center;position:relative;z-index:2}
  .notify-card h2{margin-top:14px}
  .notify-card .sec-lede{color:var(--ink);opacity:.8}
  .notify-form{display:flex;gap:8px;margin-top:24px;background:#fff;padding:6px;border-radius:14px;border:2px solid var(--ink);max-width:520px}
  .notify-form input{flex:1;border:none;outline:none;font-size:15px;padding:12px 14px;background:transparent;font-family:inherit;color:var(--ink)}
  .notify-form button{background:var(--purple);color:#fff;border-radius:10px;padding:12px 22px;font-weight:700;font-size:14.5px}
  .notify-form button:hover{background:var(--purple-deep)}
  .notify-perks{display:grid;gap:12px;margin-top:24px}
  .notify-perk{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
  .notify-perk .check{width:22px;height:22px;border-radius:50%;background:var(--purple);color:var(--yellow);display:grid;place-items:center;flex-shrink:0}
  .notify-side{background:#fff;border:2px solid var(--ink);border-radius:24px;padding:28px;box-shadow:8px 8px 0 var(--ink)}
  .ns-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px dashed var(--line);font-size:13.5px;font-weight:600;gap:12px}
  .ns-row:last-child{border-bottom:none}
  .ns-row .v{color:var(--purple);font-family:'Noto Sans',sans-serif;font-weight:700;text-align:right}
  .ns-head{font-family:'Noto Sans',sans-serif;font-size:12px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .ns-bignum{font-size:48px;font-weight:800;color:var(--purple);letter-spacing:-.03em;margin:8px 0}

  footer{background:var(--ink);color:#fff;padding:72px 0 32px}
  .foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:40px}
  .foot-logo{font-size:24px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .foot-tag{color:rgba(255,255,255,.6);font-size:14px;line-height:1.6;max-width:280px}
  .foot-social{display:flex;gap:10px;margin-top:20px}

  @media (max-width:980px){

    .nav-inner{gap:8px}
    .container{padding:0 16px}
    section{padding:44px 0}
    .hero-grid{padding:36px 0 44px;gap:20px}
    .hero-sub{font-size:16px;margin:14px 0 20px}

    .notify-form button{border-radius:8px;padding:13px 22px;text-align:center;font-size:14px}
    .map{aspect-ratio:1.2/1}
    .loc-actions{grid-template-columns:1fr}
    .stat-card{min-width:0;flex:1 1 calc(50% - 9px)}
    .hero-marquee{gap:10px;flex-wrap:wrap;margin-top:20px;font-size:11px}
    .deal-carousel-wrap{gap:6px}

    .what-stat{gap:8px}

    .loc-card{padding:20px}
    footer{padding:52px 0 28px}
    .foot-grid{gap:28px}
    .foot-tag{font-size:13px}
    .ribbon{display:none}
  }

  /* ===== SCROLL ANIMATIONS ===== */
  [data-anim]{opacity:0;will-change:transform,opacity;transition:transform .85s cubic-bezier(.22,1,.36,1),opacity .75s ease}

  [data-anim="right"]{transform:translateX(56px)}

  [data-delay="7"]{transition-delay:630ms}

/* ============ PRODUCTS ============ */
function Products(){
  const t = useT();
  const trackRef = React.useRef(null);
  const [idx, setIdx] = React.useState(0);
  const DEALS = [
    {name:t("Dynamo Powder Downy 2KG","Dynamo Powder Downy 2KG"),                             np:"13.90",sp:"8.99",  img:"assets/product-rice.png",   period:"1 – 30.6.2026"},
    {name:t("Dynamo Power Gel Perfect Clean / Downy Refill 810ML","Dynamo Power Gel Perfect Clean / Downy Refill 810ML"), np:"11.90",sp:"6.99",  img:"assets/product-oil.png",    period:"1 – 30.6.2026"},
    {name:t("Dove Go Fresh / Beauty Nourishing Body Wash 1L","Dove Go Fresh / Beauty Nourishing Body Wash 1L"),         np:"24.90",sp:"18.99", img:"assets/product-water.png",  period:"1 – 30.6.2026"},
    {name:t("Blinic Antibacterial Soap Clean / Pine / Fresh 3x105G","Blinic Antibacterial Soap Clean / Pine / Fresh 3x105G"), np:"6.90", sp:"5.99",  img:"assets/product-sauce.png",  period:"1 – 30.6.2026"},
    {name:t("Maggi Mi Goreng Asli 5x80G","Maggi Mi Goreng Asli 5x80G"),                       np:"8.90", sp:"5.49",  img:"assets/product-noodle.png", period:"1 – 30.6.2026"},
    {name:t("Cap Faiza Beras Super Tempatan 5KG","Cap Faiza Beras Super Tempatan 5KG"),        np:"22.00",sp:"16.99", img:"assets/product-rice.png",   period:"1 – 30.6.2026"},
  ];
  const [visCount, setVisCount] = React.useState(4);
  React.useEffect(()=>{
    const tr = trackRef.current;
    if(!tr) return;
    const calc = ()=>{
      const card = tr.children[0];
      if(card) setVisCount(Math.max(1, Math.round(tr.offsetWidth / (card.offsetWidth + 12))));
    };
    calc();
    window.addEventListener('resize', calc);
    return ()=>window.removeEventListener('resize', calc);
  },[]);
  const maxIdx = Math.max(0, DEALS.length - visCount);
  const scrollTo = (n) => {
    const clamped = Math.max(0, Math.min(Math.max(0, DEALS.length - visCount), n));
    setIdx(clamped);
    const tr = trackRef.current;
    if(!tr || !tr.children[0]) return;
    tr.scrollTo({left: clamped * (tr.children[0].offsetWidth + 12), behavior:'smooth'});
  };
  return (
    <section className="tinted" id="store">
      <div className="container">
        <div className="prod-head" data-anim="up">
          <div>
            <span className="eyebrow">04 / {t("Tawaran kami","Our deals")}</span>
            <h2>{t("Jimat Lebih, Dapat Lebih.","Save More, Get More.")}</h2>
          </div>
        </div>
        <div className="deal-carousel-wrap" data-anim="up" data-delay="1">
          <button className="deal-nav" onClick={()=>scrollTo(idx-1)} disabled={idx<=0} aria-label={t("Sebelum","Previous")}>&#8249;</button>
          <div className="deal-track" ref={trackRef}>
            {DEALS.map((d,i)=>(
              <div className="deal-card" key={i}>
                <div className="deal-card-top">
                  <div className="deal-ribbon"></div>
                  <div className="deal-promo-label">{t("PROMOSI MYGROCER","MYGROCER PROMOTION")}</div>
                </div>
                <div className="deal-card-body">
                  <div className="deal-img-wrap">
                    <img src={d.img} alt="" className="deal-img"/>
                  </div>
                  <div className="deal-price-wrap">
                    <div className="deal-np">{t("H.BIASA","N.PRICE")}: <s>RM{d.np}</s></div>
                    <div className="deal-price-row">
                      <span className="deal-price-rm">RM</span>
                      <span className="deal-price-num">{d.sp}</span>
                    </div>
                    <div className="deal-price-each">/{t("SETIAP","EACH")}</div>
                    <div className="deal-name">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</div>
                  </div>
                </div>
                <div className="deal-disclaimer">{t("*Harga tertakluk perubahan tanpa notis. Sah selagi stok ada.","*Prices subject to change without prior notice. While stocks last.")}</div>
              </div>
            ))}
          </div>
          <button className="deal-nav" onClick={()=>scrollTo(idx+1)} disabled={idx>=maxIdx} aria-label={t("Seterusnya","Next")}>&#8250;</button>
        </div>
      </div>
    </section>
  );
}

/* ============ STORE LOCATOR ============ */
function StoreLoc(){
  const t = useT();
  const [active, setActive] = React.useState(0);
  const mapRef = React.useRef(null);
  const leafletMap = React.useRef(null);
  const markersRef = React.useRef([]);
  const didMount = React.useRef(false);

  const STORES = [
    {
      num: t("KEDAI #001 · BUKA SEKARANG","STORE #001 · OPEN NOW"),
      name: "MyGrocer Taman Sri Sentosa",
      addr: ["C-G-8, Block C Pangsapuri Kos Rendah AC4,","Jalan Taman Sri Sentosa,","Taman Sri Sentosa, 58000 Kuala Lumpur."],
      lat: 3.0863, lng: 101.6724,
      hours: t("Buka harian","Open daily"),
      hoursVal: "9:00 AM – 10:00 PM",
      tags: ["FACE SCAN","e-WALLET","FREE PARKING","SURAU 2 MIN"],
      open: true,
    },
    {
      num: t("KEDAI #002 · AKAN DATANG","STORE #002 · COMING SOON"),
      name: "MyGrocer Taman Medan",
      addr: ["D-G-16, Apartmen Medan Jaya,","Jalan PJS 2/1, Taman Dato Harun,","46000 Petaling Jaya, Selangor."],
      lat: 3.0802, lng: 101.6273,
      hours: null, hoursVal: null, tags: [],
      open: false,
    },
  ];

  function makeIcon(idx, isActive){
    const store = STORES[idx];
    const size = isActive ? 38 : store.open ? 30 : 26;
    const bg = store.open ? '#863694' : '#aaa';
    const border = isActive ? '3px solid #FFDE17' : '2px solid #fff';
    return L.divIcon({
      html: '<div style="width:'+size+'px;height:'+size+'px;background:'+bg+';border:'+border+';border-radius:50%;box-shadow:0 3px 10px rgba(0,0,0,.35)"></div>',
      className: '',
      iconSize: [size, size],
      iconAnchor: [size/2, size/2],
    });
  }

  React.useEffect(() => {
    if (leafletMap.current || !mapRef.current) return;
    const map = L.map(mapRef.current, {zoomControl:true, scrollWheelZoom:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);
    STORES.forEach((store, i) => {
      const marker = L.marker([store.lat, store.lng], {icon: makeIcon(i, i===0)})
        .addTo(map)
        .bindPopup('<b>'+store.name+'</b>');
      marker.on('click', () => setActive(i));
      markersRef.current.push(marker);
    });
    const group = L.featureGroup(markersRef.current);
    map.fitBounds(group.getBounds().pad(0.5));
    markersRef.current[0]?.openPopup();
    leafletMap.current = map;
  }, []);

  React.useEffect(() => {
    if (!didMount.current) { didMount.current = true; return; }
    if (!leafletMap.current) return;
    const store = STORES[active];
    leafletMap.current.flyTo([store.lat, store.lng], 15, {duration:0.8});
    markersRef.current.forEach((m, i) => m.setIcon(makeIcon(i, i===active)));
    setTimeout(() => markersRef.current[active]?.openPopup(), 850);
  }, [active]);

  const s = STORES[active];
  return (
    <section id="contact">
      <div className="container">
        <span className="eyebrow" data-anim="up">05 / {t("Kedai kami","Our stores")}</span>
        <h2 data-anim="up" data-delay="1">{t("Jumpa kami di sini.","Find us here.")}</h2>
        <div className="loc-grid">
          <div className="map" data-anim="left" ref={mapRef}></div>
          <div className="loc-card" data-anim="right" data-delay="2">
            <div className="loc-dropdown">
              <select className="loc-select" value={active} onChange={e=>setActive(+e.target.value)}>
                {STORES.map((store, i) => (
                  <option key={i} value={i}>{store.name}</option>
                ))}
              </select>
              <span className="loc-select-arrow">&#9660;</span>
            </div>
            <span className="loc-num" style={{marginTop:16}}>{s.num}</span>
            <div className="loc-title">{s.name}</div>
            <div className="loc-addr">
              {s.addr[0]}<br/>{s.addr[1]}<br/>{s.addr[2]}
            </div>
            {s.hours ? (
              <div className="loc-hours">
                <span><b>{s.hours}</b></span>
                <span className="mono"><b>{s.hoursVal}</b></span>
              </div>
            ) : (
              <div className="loc-soon">
                {t("Kedai ini akan dibuka tidak lama lagi. Nantikan!","This store is opening soon. Stay tuned!")}
              </div>
            )}
            {s.tags.length > 0 && (
              <div className="loc-tags">
                {s.tags.map(tag => <span key={tag} className="loc-tag">{tag}</span>)}
              </div>
            )}
            <div className="loc-actions">
              <button className="btn btn-primary" style={{justifyContent:'center'}}><I.pin/> {t("Buka di Waze","Open in Waze")}</button>
              <button className="btn btn-yellow" style={{justifyContent:'center'}}><I.pin/> Google Maps</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============ APP ============ */
function App(){
  const [lang,setLangState]=useState(()=>{
    try { return localStorage.getItem('mygrocer.lang') || 'bm' } catch(e){ return 'bm' }
  });
  const setLang = (l) => { setLangState(l); try { localStorage.setItem('mygrocer.lang', l) } catch(e){} document.documentElement.lang = l === 'bm' ? 'ms' : 'en'; };
  useEffect(()=>{ document.documentElement.lang = lang === 'bm' ? 'ms' : 'en' },[lang]);
  useEffect(()=>{
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);} }),
      {threshold:0.1,rootMargin:'0px 0px -60px 0px'}
    );
    document.querySelectorAll('[data-anim]').forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);

  useEffect(()=>{
    const lenis = new window.Lenis({
      duration:1.4,
      easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)),
      smoothWheel:true,
      wheelMultiplier:0.9,
    });
    function raf(time){lenis.raf(time);requestAnimationFrame(raf);}
    requestAnimationFrame(raf);
    return ()=>lenis.destroy();
  },[]);

  return (
    <LangCtx.Provider value={{lang,setLang}}>
      <Nav />
      <Hero />
      <WhatIs/>
      <HowItWorks/>
      <Why/>
      <Products/>
      <StoreLoc/>
      
      <Footer/>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
